# Конфигурация симулятора НТЦ v2
# 10 отделов, 500-1000 работ/отдел/месяц, срывы сроков, отчёты сотрудников

server:
  base_url: "http://localhost:8001"
  api_prefix: "/api"

# Учётные данные admin-пользователя (уже существует в БД)
admin:
  username: "admin"
  password: "admin"

# Параметры симуляции
simulation:
  year: 2026
  seed: 42

# Оргструктура — 10 отделов
org:
  ntc_centers: 2
  departments_per_center: [5, 5]   # 5+5 = 10 отделов
  sectors_per_dept: [3, 4]         # 3-4 сектора на отдел
  employees_per_sector: [5, 8]     # 5-8 сотрудников на сектор
  # Итого: ~10 отделов * ~3.5 сектора * ~6.5 сотрудников ≈ 225+ рядовых
  # + начальники отделов/секторов/НТЦ ≈ 300+ всего

# Проекты
projects:
  count: 6
  pp_plans_per_project: [2, 3]     # больше ПП-планов
  pp_rows_per_plan: [80, 150]      # 80-150 строк ПП на план

# Месячная активность — на отдел
monthly:
  # Задачи СП на отдел в месяц (добирают до минимума 500/отдел вместе с ПП)
  sp_tasks_per_dept: [200, 400]
  # Минимум работ на отдел (ПП + СП суммарно)
  min_tasks_per_dept: 500
  max_tasks_per_dept: 1000
  # Минимум работ на сотрудника
  min_tasks_per_employee: 4
  # Обновления задач — процент от общего числа задач
  task_update_ratio: 0.15
  # Отчёты — каждый сотрудник заполняет отчёт в конце месяца
  reports_per_employee: true
  # Отпуска
  vacation_probability: 0.05
  # Извещения
  notices_per_month: [10, 30]
  # Корректировки ПП на отдел
  pp_changes_per_dept: [3, 8]
  # Срывы сроков: от 5% до 50% работ
  deadline_miss_ratio: [0.05, 0.50]
  # Длительность работ (дней)
  task_duration: [20, 120]        # от ~1 месяца до ~4 месяцев

# Зависимости
dependencies:
  coverage: 0.15   # 15% задач (снижено из-за объёма)
  types:
    FS: 0.70
    SS: 0.15
    FF: 0.10
    SF: 0.05
  max_lag_days: 5

# Конкурентность
concurrency:
  parallel_users: 5
