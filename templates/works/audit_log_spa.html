{% extends "base.html" %}
{% load static %}
{% block title %}Журнал аудита — ПРИЗМА{% endblock %}

{% block breadcrumb %}

<span class="breadcrumb-current">Журнал аудита</span>
{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{% static 'css/audit_log.css' %}?v=5">
{% endblock %}

{% block content %}

</div>

<div class="section" style="padding:20px;">

    <div class="skeleton skeleton-row" style="height:36px;margin:6px 0;"></div>
    <div class="skeleton skeleton-row" style="height:36px;margin:6px 0;"></div>

{% block scripts %}
<script src="{% static 'js/audit_log.js' %}?v=5"></script>
{% endblock %}
