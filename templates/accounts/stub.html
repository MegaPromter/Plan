{% extends "base.html" %}
<!-- Шаблон-заглушка для разделов, находящихся в разработке -->
{% block title %}{{ stub_title }} — Система управления{% endblock %}

{% block breadcrumb %}
<span>/</span>
<!-- Название раздела-заглушки в хлебных крошках -->
<span class="breadcrumb-current">{{ stub_title }}</span>
{% endblock %}

{% block content %}
<!-- Центрированный блок с сообщением «В разработке» -->
<div style="display:flex; align-items:center; justify-content:center; min-height:60vh;">
  <div style="text-align:center; max-width:480px;">
    <!-- Иконка-заглушка (знак строительства) -->
    <div style="
      width:96px; height:96px; margin:0 auto 28px;
      background:var(--surface2); border-radius:24px;
      display:flex; align-items:center; justify-content:center;
      font-size:40px;
    ">🚧</div>
    <!-- Название раздела из контекста (передаётся view) -->
    <h1 style="font-size:24px; font-weight:700; color:var(--text); margin-bottom:12px;">
      {{ stub_title }}
    </h1>
    <!-- Описание раздела и метка «в разработке» -->
    <p style="font-size:15px; color:var(--muted); line-height:1.7; margin-bottom:32px;">
      {{ stub_desc }}<br>
      <span style="color:var(--warning); font-size:13px;">Раздел находится в разработке</span>
    </p>
    <!-- Кнопка возврата на главную страницу -->
    <a href="{% url 'accounts:dashboard' %}" class="btn btn-secondary">
      <i class="fas fa-arrow-left"></i> На главную
    </a>
  </div>
</div>
{% endblock %}
