<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<title>Письмо отправлено — ПРИЗМА</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f0f2f5;--surface:#fff;--accent:#2563eb;--text:#1e293b;--text2:#475569;--success:#16a34a;--font:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;}
body{min-height:100vh;background:var(--bg);font-family:var(--font);color:var(--text);font-size:14px;display:flex;align-items:center;justify-content:center;}
.card{background:var(--surface);border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,0.08);padding:36px 32px;max-width:440px;width:100%;text-align:center;}
h1{font-size:20px;font-weight:700;margin-bottom:10px;}
.msg{color:var(--text2);font-size:13px;line-height:1.6;margin-bottom:20px;}
.back{display:inline-block;padding:10px 24px;border-radius:10px;font-size:14px;font-weight:600;background:linear-gradient(135deg,var(--accent),#1d4ed8);color:#fff;text-decoration:none;transition:opacity .15s;}
.back:hover{opacity:.9;}
</style>
</head>
<body>
<div class="card">
  <div style="text-align:center;margin-bottom:20px;">
    <div style="display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;background:linear-gradient(135deg,#2563eb,#1d4ed8);border-radius:12px;color:#fff;font-size:22px;font-weight:800;margin-bottom:8px;">П</div>
    <div style="font-size:18px;font-weight:700;letter-spacing:4px;color:var(--text);">ПРИЗМА</div>
  </div>
  <h1>Письмо отправлено</h1>
  <p class="msg">
    Если пользователь с указанным email существует в системе, на него было отправлено письмо со ссылкой для сброса пароля.<br><br>
    Проверьте почту (в том числе папку «Спам»).
  </p>
  <a href="{% url 'accounts:login' %}" class="back">Вернуться к входу</a>
</div>
</body>
</html>
