{% extends "base.html" %}
{% block title %}Управление предприятием — ПРИЗМА{% endblock %}

{% block breadcrumb %}
<span class="breadcrumb-sep" aria-hidden="true">/</span>
<span class="breadcrumb-current">Управление предприятием</span>
{% endblock %}

{% block content %}
<div style="display:flex; align-items:center; justify-content:center; min-height:60vh;">
  <div style="text-align:center; max-width:480px;">
    <div style="
      width:96px; height:96px; margin:0 auto 28px;
      background:var(--surface2); border-radius:24px;
      display:flex; align-items:center; justify-content:center;
      font-size:40px;
    ">&#x1F512;</div>
    <h1 style="font-size:24px; font-weight:700; color:var(--text); margin-bottom:12px;">
      Управление предприятием
    </h1>
    <p style="font-size:17px; color:var(--muted); line-height:1.7; margin-bottom:32px;">
      Только для Генерального директора ;)
    </p>
    <a href="{% url 'accounts:dashboard' %}" class="btn btn-secondary">
      <i class="fas fa-arrow-left"></i> На главную
    </a>
  </div>
</div>
{% endblock %}
