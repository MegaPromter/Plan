<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Этапы — Вариант 3: Двухпанельный layout (список + детали)</title>
<style>
  :root {
    --bg: #f5f6fa;
    --surface: #fff;
    --surface2: #f0f1f5;
    --text: #1a1d2e;
    --muted: #7b819a;
    --accent: #4361ee;
    --accent-glow: #eef1ff;
    --border: #e2e4ed;
    --border2: #d5d8e3;
    --danger: #ef4444;
    --success: #22c55e;
    --warning: #f59e0b;
    --shadow-lg: 0 8px 32px rgba(0,0,0,.12);
    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 16px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter','Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); display:flex; justify-content:center; align-items:flex-start; min-height:100vh; padding:40px 20px; }

  .modal-overlay {
    background:var(--surface); border-radius:var(--radius-lg); box-shadow:var(--shadow-lg);
    width:1060px; height:80vh; display:flex; flex-direction:column; overflow:hidden;
  }

  /* Шапка */
  .modal-header {
    padding:16px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center;
    justify-content:space-between; flex-shrink:0;
  }
  .modal-header h2 { font-size:16px; font-weight:600; display:flex; align-items:center; gap:8px; }
  .modal-close { background:none; border:none; cursor:pointer; font-size:20px; color:var(--muted); padding:4px 8px; border-radius:var(--radius-sm); }
  .modal-close:hover { background:var(--surface2); color:var(--text); }

  /* Две панели */
  .split {
    flex:1; display:flex; min-height:0;
  }

  /* Левая панель — список */
  .left-panel {
    width:380px; border-right:1px solid var(--border); display:flex; flex-direction:column;
    flex-shrink:0;
  }
  .left-toolbar {
    padding:12px 16px; border-bottom:1px solid var(--border); display:flex; gap:8px; align-items:center;
    flex-shrink:0;
  }
  .left-toolbar input {
    flex:1; padding:7px 10px; border:1px solid var(--border); border-radius:var(--radius-sm);
    font:inherit; font-size:12px; background:var(--surface2); outline:none;
  }
  .left-toolbar input:focus { border-color:var(--accent); background:var(--surface); }
  .btn-add {
    width:32px; height:32px; border:none; border-radius:var(--radius-sm); background:var(--accent);
    color:#fff; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center;
    flex-shrink:0; transition:opacity .15s;
  }
  .btn-add:hover { opacity:.85; }

  .stage-list {
    flex:1; overflow-y:auto; padding:4px 0;
  }
  .stage-item {
    padding:10px 16px; cursor:pointer; border-left:3px solid transparent;
    transition:all .15s; display:flex; align-items:center; gap:10px;
  }
  .stage-item:hover { background:var(--surface2); }
  .stage-item.active { background:var(--accent-glow); border-left-color:var(--accent); }
  .stage-item-badge {
    background:var(--accent); color:#fff; border-radius:var(--radius-sm); padding:2px 8px;
    font-size:11px; font-weight:700; flex-shrink:0; min-width:36px; text-align:center;
  }
  .stage-item-info { flex:1; min-width:0; }
  .stage-item-name { font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .stage-item-sub { font-size:11px; color:var(--muted); margin-top:2px; }
  .stage-item-pct {
    font-size:11px; font-weight:600; flex-shrink:0; padding:2px 6px; border-radius:4px;
  }
  .stage-item-pct.done { background:#dcfce7; color:#16a34a; }
  .stage-item-pct.partial { background:#fef3c7; color:#d97706; }
  .stage-item-pct.none { background:var(--surface2); color:var(--muted); }

  .left-footer {
    padding:10px 16px; border-top:1px solid var(--border); font-size:11px; color:var(--muted);
    flex-shrink:0; display:flex; justify-content:space-between;
  }

  /* Правая панель — детали */
  .right-panel {
    flex:1; display:flex; flex-direction:column; min-width:0;
  }
  .right-empty {
    flex:1; display:flex; align-items:center; justify-content:center; flex-direction:column;
    color:var(--muted); gap:12px;
  }
  .right-empty-icon { font-size:48px; opacity:.3; }
  .right-empty-text { font-size:13px; }

  .detail-header {
    padding:16px 24px; border-bottom:1px solid var(--border); flex-shrink:0;
  }
  .detail-title { font-size:18px; font-weight:600; margin-bottom:4px; }
  .detail-meta { display:flex; gap:16px; font-size:12px; color:var(--muted); }
  .detail-meta-item { display:flex; align-items:center; gap:4px; }

  .detail-body {
    flex:1; overflow-y:auto; padding:20px 24px;
  }

  /* Карточки полей */
  .field-grid {
    display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:24px;
  }
  .field-card {
    background:var(--bg); border-radius:var(--radius-md); padding:14px 16px;
  }
  .field-card-label { font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); font-weight:600; margin-bottom:6px; }
  .field-card-value { font-size:15px; font-weight:600; }
  .field-card-value code { background:var(--surface); padding:2px 8px; border-radius:4px; font-size:13px; }
  .field-card-value .editable {
    border:none; background:transparent; font:inherit; font-size:15px; font-weight:600; color:var(--text);
    border-bottom:1px dashed var(--border); outline:none; width:100%;
  }
  .field-card-value .editable:focus { border-bottom-color:var(--accent); }

  /* Прогресс-бар */
  .progress-section { margin-bottom:24px; }
  .progress-section h3 { font-size:12px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); font-weight:600; margin-bottom:12px; }
  .progress-bar-wrap {
    background:var(--surface2); border-radius:8px; height:24px; overflow:hidden; position:relative;
    margin-bottom:8px;
  }
  .progress-bar-fill {
    height:100%; border-radius:8px; transition:width .4s ease;
    display:flex; align-items:center; padding-left:10px; font-size:11px; font-weight:700; color:#fff;
  }
  .progress-bar-fill.low { background:linear-gradient(90deg, #818cf8, var(--accent)); }
  .progress-bar-fill.mid { background:linear-gradient(90deg, #fbbf24, #f59e0b); }
  .progress-bar-fill.high { background:linear-gradient(90deg, #4ade80, #22c55e); }
  .progress-bar-fill.over { background:linear-gradient(90deg, #f87171, #ef4444); }
  .progress-stats { display:flex; justify-content:space-between; font-size:12px; color:var(--muted); }

  /* Работы этапа */
  .works-section h3 { font-size:12px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); font-weight:600; margin-bottom:12px; }
  .works-list { display:flex; flex-direction:column; gap:6px; }
  .work-row {
    display:flex; align-items:center; gap:10px; padding:8px 12px; background:var(--bg);
    border-radius:var(--radius-sm); font-size:12px;
  }
  .work-row-name { flex:1; font-weight:500; }
  .work-row-hours { color:var(--muted); min-width:60px; text-align:right; }
  .work-row-status { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .work-row-status.done { background:var(--success); }
  .work-row-status.progress { background:var(--warning); }
  .work-row-status.pending { background:var(--border); }

  /* Действия */
  .detail-footer {
    padding:12px 24px; border-top:1px solid var(--border); display:flex; gap:8px;
    justify-content:flex-end; flex-shrink:0;
  }
  .btn-outline {
    padding:8px 16px; border:1px solid var(--border); border-radius:var(--radius-sm);
    background:var(--surface); font:inherit; font-size:12px; cursor:pointer; transition:all .15s;
  }
  .btn-outline:hover { border-color:var(--accent); color:var(--accent); }
  .btn-danger-outline {
    padding:8px 16px; border:1px solid #fecaca; border-radius:var(--radius-sm);
    background:#fff; font:inherit; font-size:12px; cursor:pointer; color:var(--danger); transition:all .15s;
  }
  .btn-danger-outline:hover { background:#fef2f2; border-color:var(--danger); }
  .btn-primary {
    padding:8px 16px; border:none; border-radius:var(--radius-sm); background:var(--accent);
    color:#fff; font:inherit; font-size:12px; font-weight:600; cursor:pointer; transition:opacity .15s;
  }
  .btn-primary:hover { opacity:.9; }

  /* Форма нового этапа (правая панель) */
  .new-stage-form {
    flex:1; display:flex; flex-direction:column; padding:24px;
  }
  .new-stage-form h3 { font-size:15px; font-weight:600; margin-bottom:20px; }
  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .form-group { margin-bottom:16px; }
  .form-group label { display:block; font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:6px; }
  .form-group input {
    width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:var(--radius-sm);
    font:inherit; font-size:13px; outline:none; transition:border .15s;
  }
  .form-group input:focus { border-color:var(--accent); }
</style>
</head>
<body>

<div class="modal-overlay">
  <div class="modal-header">
    <h2>&#9776; Этапы проекта <span style="font-weight:400;color:var(--muted);font-size:13px;margin-left:4px;">ДОС</span></h2>
    <button class="modal-close">&times;</button>

  <div class="split">

        <div class="right-empty-text">Выберите этап из списка слева</div>

</div>

var _activeIdx = -1;

function pctClass(pct) {
  if (pct >= 100) return 'done';
  if (pct > 0) return 'partial';
  return 'none';
}
function barClass(pct) {
  if (pct > 100) return 'over';
  if (pct >= 80) return 'high';
  if (pct >= 40) return 'mid';
  return 'low';
}

function renderList(filter) {
  var list = document.getElementById('stageList');
  var q = (filter || '').toLowerCase();
  var totalPlan = 0;
  STAGES.forEach(function(s) { totalPlan += s.plan; });

  var html = '';
  STAGES.forEach(function(s, i) {
    if (q && s.name.toLowerCase().indexOf(q) === -1 && s.num.indexOf(q) === -1) return;
    var pct = s.plan > 0 ? Math.round(s.spent / s.plan * 100) : 0;
    var cls = pctClass(pct);
    html += '<div class="stage-item' + (i === _activeIdx ? ' active' : '') + '" data-idx="' + i + '">' +
      '<span class="stage-item-badge">' + s.num + '</span>' +
      '<div class="stage-item-info">' +
        '<div class="stage-item-name">' + s.name + '</div>' +
        '<div class="stage-item-sub">' + s.order + ' &middot; ' + s.code + '</div>' +
      '</div>' +
      '<span class="stage-item-pct ' + cls + '">' + pct + '%</span>' +
    '</div>';
  });
  list.innerHTML = html;
  document.getElementById('countLabel').textContent = STAGES.length + ' этапов';
  document.getElementById('totalLabel').textContent = totalPlan.toLocaleString('ru') + ' ч план';

  list.querySelectorAll('.stage-item').forEach(function(el) {
    el.addEventListener('click', function() {
      _activeIdx = parseInt(el.dataset.idx);
      renderList(document.getElementById('searchInput').value);
      renderDetail(STAGES[_activeIdx]);
    });
  });
}

      '<div class="work-row-status ' + w.s + '"></div>' +
      '<div class="work-row-name">' + w.name + '</div>' +
      '<div class="work-row-hours">' + w.h + ' ч</div>' +

      '</div>' +
    '</div>' +
    '<div class="detail-body">' +
      '<div class="field-grid">' +
        '<div class="field-card">' +
          '<div class="field-card-label">Наименование</div>' +
          '<div class="field-card-value"><input class="editable" value="' + s.name + '"></div>' +
        '</div>' +
        '<div class="field-card">' +
          '<div class="field-card-label">№ этапа</div>' +
          '<div class="field-card-value"><input class="editable" value="' + s.num + '" style="max-width:80px"></div>' +
        '</div>' +
        '<div class="field-card">' +
          '<div class="field-card-label">Наряд-заказ</div>' +
          '<div class="field-card-value"><input class="editable" value="' + s.order + '"></div>' +
        '</div>' +
        '<div class="field-card">' +
          '<div class="field-card-label">Код строки</div>' +
          '<div class="field-card-value"><code>' + s.code + '</code></div>' +
        '</div>' +
      '</div>' +
      '<div class="progress-section">' +
        '<h3>Трудоёмкость</h3>' +
        '<div class="progress-bar-wrap">' +
          '<div class="progress-bar-fill ' + cls + '" style="width:' + barW + '%">' +
            (barW > 15 ? pct + '%' : '') +
          '</div>' +
        '</div>' +
        '<div class="progress-stats">' +
          '<span>Потрачено: <strong>' + s.spent.toLocaleString('ru') + '</strong> ч</span>' +
          '<span>Запланировано: <strong>' + s.plan.toLocaleString('ru') + '</strong> ч</span>' +
        '</div>' +
      '</div>' +
      '<div class="works-section">' +
        '<h3>Работы этапа (' + s.works.length + ')</h3>' +
        '<div class="works-list">' + worksHtml + '</div>' +
      '</div>' +
    '</div>' +
    '<div class="detail-footer">' +
      '<button class="btn-danger-outline">Удалить этап</button>' +
      '<button class="btn-outline">Отмена</button>' +
      '<button class="btn-primary">Сохранить</button>' +
    '</div>';
}

document.getElementById('searchInput').addEventListener('input', function() {
  renderList(this.value);
});

document.getElementById('addBtn').addEventListener('click', function() {
  _activeIdx = -1;
  renderList(document.getElementById('searchInput').value);
  var panel = document.getElementById('rightPanel');
  panel.innerHTML =
    '<div class="new-stage-form">' +
      '<h3>&#10010; Новый этап</h3>' +
      '<div class="form-grid">' +
        '<div class="form-group"><label>Наименование</label><input placeholder="Наименование этапа" autofocus></div>' +
        '<div class="form-group"><label>№ этапа</label><input placeholder="Например: 3.1"></div>' +
        '<div class="form-group"><label>Наряд-заказ</label><input placeholder="Например: НЗ-789"></div>' +
        '<div class="form-group"><label>Код строки</label><input placeholder="Например: КС-432"></div>' +
      '</div>' +
      '<div style="margin-top:auto;display:flex;gap:8px;justify-content:flex-end">' +
        '<button class="btn-outline">Отмена</button>' +
        '<button class="btn-primary">Создать этап</button>' +
      '</div>' +
    '</div>';
});

renderList();
</script>
</body>
</html>
